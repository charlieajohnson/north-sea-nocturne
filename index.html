<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>North Sea Nocturne</title>
    <meta name="description" content="A living nocturnal field of UK east coast and North Sea nighttime lights" />
    <meta name="theme-color" content="#040810" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #040810; }
      body { font-family: "Inter", "SF Pro Display", -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
      input[type="range"] { -webkit-appearance: none; appearance: none; background: transparent; cursor: pointer; }
      input[type="range"]::-webkit-slider-track { height: 2px; background: rgba(255,255,255,0.08); border-radius: 1px; }
      input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #fff; border: none; margin-top: -5px; box-shadow: 0 0 6px rgba(255,255,255,0.2); }
      input[type="range"]::-moz-range-track { height: 2px; background: rgba(255,255,255,0.08); border-radius: 1px; border: none; }
      input[type="range"]::-moz-range-thumb { width: 12px; height: 12px; border-radius: 50%; background: #fff; border: none; box-shadow: 0 0 6px rgba(255,255,255,0.2); }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
      ::selection { background: rgba(68,136,255,0.3); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
